version: 2
updates:

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    versioning-strategy: increase

  - package-ecosystem: npm
    directories:
      - /
      - node.js/
    schedule:
      interval: daily
    groups:
      prod-dependencies:
        dependency-type: production
      dev-dependencies:
        dependency-type: development
    versioning-strategy: increase
